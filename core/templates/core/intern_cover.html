<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Cover Letter | JobNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .cover-card {
            background: white;
            padding: 40px;
            width: 500px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            color: #1a73e8;
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 12px;
            resize: vertical;
            outline: none;
        }

        .submit-btn {
            margin-top: 20px;
            width: 100%;
            background-color: #1a73e8;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #125ecc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="cover-card">
    <h2>Submit Cover Letter</h2>
    <form method="post">
        {% csrf_token %}
        <textarea name="cover_letter" placeholder="Write your cover letter here..." required></textarea>
        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

</body>
</html>
