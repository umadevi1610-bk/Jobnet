<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login & Signup | JobNet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(120deg, #2980b9, #8e44ad); height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrapper { width: 400px; background: #fff; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.2); animation: slideDown 0.8s ease-in-out; }
    @keyframes slideDown { 0% { transform: translateY(-100px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    .form-box { display: none; }
    .form-box.active { display: block; }
    h2 { text-align: center; margin-bottom: 25px; color: #333; }
    input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #2980b9; color: white; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; transition: background 0.3s ease; }
    button:hover { background: #3498db; }
    .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; }
    .toggle-link a { color: #8e44ad; font-weight: bold; cursor: pointer; text-decoration: none; }
  </style>
</head>
<body>

  <div class="wrapper">

    <!-- Login Form -->
    <div class="form-box active" id="loginBox">
      <h2>Login to JobNet</h2>
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
      </form>
      <div class="toggle-link">
        Don't have an account? <a onclick="toggleForm('signupBox')">Sign Up</a>
      </div>
    </div>

    <!-- Signup Form -->
    <div class="form-box" id="signupBox">
      <h2>Sign Up</h2>
      <form method="post" action="/signup/">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password1" placeholder="Password" required>
        <input type="password" name="password2" placeholder="Confirm Password" required>
        <button type="submit">Sign Up</button>
      </form>
      {% if error %}
        <p style="color:red; text-align:center;">{{ error }}</p>
      {% endif %}
      <div class="toggle-link">
        Already have an account? <a onclick="toggleForm('loginBox')">Login</a>
      </div>
    </div>

  </div>

  <script>
    function toggleForm(id) {
      document.getElementById('loginBox').classList.remove('active');
      document.getElementById('signupBox').classList.remove('active');
      document.getElementById(id).classList.add('active');
    }
  </script>

</body>
</html>
