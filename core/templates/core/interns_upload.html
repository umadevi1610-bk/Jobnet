<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Resume | JobNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .upload-card {
            background: white;
            padding: 40px;
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in-out;
        }

        .upload-card h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #1a73e8;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-label {
            display: block;
            background: #e3eaf2;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            color: #333;
            margin-bottom: 20px;
        }

        .upload-btn {
            width: 100%;
            background: #1a73e8;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s ease;
        }

        .upload-btn:hover {
            background: #0c56c5;
        }

        .success-box {
            margin-top: 20px;
            background: #dff0d8;
            padding: 15px;
            border-left: 5px solid #4caf50;
            border-radius: 8px;
            color: #3c763d;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="upload-card">
    <h2>Upload Your Resume</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label class="custom-file-label" for="resume">📂 Choose Resume File</label>
        <input type="file" name="resume" id="resume" required>
        <button type="submit" class="upload-btn">Upload</button>
    </form>

    {% if uploaded_file_url %}
    <div class="success-box">
        ✅ Resume uploaded successfully!<br>
        <a href="{{ uploaded_file_url }}" target="_blank">📄 View Uploaded File</a>
    </div>
    {% endif %}
</div>

<script>
    const fileInput = document.getElementById('resume');
    const label = document.querySelector('.custom-file-label');

    fileInput.addEventListener('change', function () {
        label.textContent = '📄 ' + this.files[0].name;
    });
</script>

</body>
</html>
